name: Build Xbox UWP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - xbox-uwp
    paths:
      - 'uwp/**'
      - '.github/workflows/build-xbox-uwp.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'uwp/**'
      - '.github/workflows/build-xbox-uwp.yml'

permissions:
  contents: read

concurrency:
  group: bin-weevils-xbox-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Windows UWP package
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Report build environment
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path .\ci-diagnostics | Out-Null
          msbuild -version | Tee-Object -FilePath .\ci-diagnostics\msbuild-version.txt
          Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots' |
            Format-List * |
            Out-File .\ci-diagnostics\windows-sdk-roots.txt -Encoding utf8

      - name: Generate application assets
        shell: powershell
        run: .\uwp\scripts\Generate-PlaceholderAssets.ps1

      - name: Create temporary signing certificate
        id: certificate
        shell: powershell
        run: |
          $passwordText = [Guid]::NewGuid().ToString('N')
          $password = ConvertTo-SecureString $passwordText -AsPlainText -Force
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject 'CN=BinWeevilsRewrittenXbox' `
            -KeyUsage DigitalSignature `
            -FriendlyName 'Bin Weevils Rewritten Xbox Test Certificate' `
            -CertStoreLocation 'Cert:\CurrentUser\My' `
            -TextExtension @('2.5.29.37={text}1.3.6.1.5.5.7.3.3','2.5.29.19={text}')

          New-Item -ItemType Directory -Force -Path .\uwp\signing | Out-Null
          Export-PfxCertificate -Cert $cert -FilePath .\uwp\signing\test-signing.pfx -Password $password | Out-Null
          Export-Certificate -Cert $cert -FilePath .\uwp\signing\BinWeevilsRewrittenXbox.cer | Out-Null
          "password=$passwordText" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore packages
        shell: powershell
        run: |
          msbuild .\uwp\Bin-Weevils-Rewritten-Xbox.sln `
            /t:Restore `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /v:minimal 2>&1 |
            Tee-Object -FilePath .\ci-diagnostics\restore.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build signed APPX
        shell: powershell
        run: |
          msbuild .\uwp\Bin-Weevils-Rewritten-Xbox.sln `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AppxBundle=Never `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile=${{ github.workspace }}\uwp\signing\test-signing.pfx `
            /p:PackageCertificatePassword=${{ steps.certificate.outputs.password }} `
            /v:minimal 2>&1 |
            Tee-Object -FilePath .\ci-diagnostics\build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect and verify test package
        shell: powershell
        run: |
          $packageFiles = @(Get-ChildItem .\uwp\AppPackages -Recurse -File -ErrorAction Stop)
          $appx = @($packageFiles | Where-Object { $_.Extension -in '.appx', '.msix' })
          if ($appx.Count -eq 0) {
            throw 'The UWP build completed without producing an APPX or MSIX package.'
          }

          New-Item -ItemType Directory -Force -Path .\artifact | Out-Null
          Copy-Item .\uwp\AppPackages\* .\artifact\ -Recurse -Force
          Copy-Item .\uwp\signing\BinWeevilsRewrittenXbox.cer .\artifact\ -Force
          Copy-Item .\uwp\TESTING.md .\artifact\TESTING.md -Force

          $inventory = Get-ChildItem .\artifact -Recurse -File |
            Select-Object FullName, Length, LastWriteTime
          $inventory | Format-Table -AutoSize |
            Out-String |
            Set-Content .\ci-diagnostics\artifact-files.txt

          Write-Host 'Generated installable packages:'
          $appx | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Upload Xbox test package
        uses: actions/upload-artifact@v4
        with:
          name: Bin-Weevils-Rewritten-Xbox-test-${{ github.run_number }}
          path: artifact/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Bin-Weevils-Rewritten-Xbox-diagnostics-${{ github.run_number }}
          path: ci-diagnostics/
          if-no-files-found: warn
          retention-days: 7
